name: 소진공 정책자금 수동 점검

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 실행 모드
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - live
      send_email:
        description: 실제 메일 발송 여부
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      lookback_days:
        description: 최근 공지 조회 기간(일)
        required: true
        default: '3'

jobs:
  semas-loan:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: 문법 검사
        run: python -m compileall .

      - name: 테스트 실행
        run: python -m pytest -v

      - name: 소진공 정책자금 점검 실행
        env:
          SEMAS_LOAN_URL: ${{ secrets.SEMAS_LOAN_URL }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          ALLOW_SEND_EMAIL: ${{ inputs.send_email == 'true' && 'true' || 'false' }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python -m loan.semas.collector \
            --run-mode "${{ inputs.run_mode }}" \
            --send-email "${{ inputs.send_email }}" \
            --lookback-days "${{ inputs.lookback_days }}"

      - name: 리포트 artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: semas-loan-report
          if-no-files-found: warn
          path: |
            reports/loan/semas_loan_scan.md
            reports/loan/semas_seen_notices.json

