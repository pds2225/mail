name: Auto Dev Queue

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (미리보기만, 실제 변경 없음)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  # schedule 트리거 제거(2026-07): AUTO_DEV_PAT 만료로 매일 checkout 단계에서 실패했고,
  # AUTO_DEV_AGENT="false"(에이전트 미연동)라 스케줄 실행이 실질 작업을 못 함.
  # 필요 시 위 workflow_dispatch 로 수동 실행 가능. 재가동하려면 유효한 AUTO_DEV_PAT 등록 후
  # 아래 schedule 블록을 복구할 것.
  # schedule:
  #   - cron: '0 0 * * *'   # 매일 오전 9시 KST (UTC 00:00)

concurrency:
  group: auto-dev-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  run-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_DEV_PAT || github.token }}
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 작업 자산 드리프트 점검
        run: python3 scripts/loop_verify.py --drift

      - name: Auto Dev Queue 실행
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_DEV_PAT || github.token }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          # 코딩 에이전트 슬롯 미연동: 허위 DONE 금지 (AWAITING_AGENT)
          AUTO_DEV_AGENT: "false"
          AUTO_DEV_VERIFY_QUICK: "true"
          AUTO_DEV_SAFE_EXECUTOR: "true"
        run: python3 scripts/auto_dev_queue.py

      - name: L1 검증 게이트 (loop_verify)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python3 scripts/loop_verify.py --quick

      - name: 상태 파일 커밋
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "auto-dev-queue[bot]"
          git config user.email "auto-dev-queue[bot]@users.noreply.github.com"
          git add docs/project/TASKS.md var/state/auto_dev_state.json docs/project/done_tasks.md docs/project/failed_tasks.md docs/project/blocked_tasks.md || true
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "chore(auto-dev): update queue state [skip ci]"
            git push || true
          fi
