name: 수출지원 모니터링 자동 실행

on:
  schedule:
    # 매일 오전 8시 KST (= UTC 23시, 전날 기준)
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (Actions 탭에서 즉시 실행 가능)

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 모니터링 실행
        env:
          BIZINFO_API_KEY:    ${{ secrets.BIZINFO_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monitor.py

      - name: seen_ids.json 커밋 (중복방지 DB 저장)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json || true
          git diff --staged --quiet || git commit -m "chore: seen_ids 업데이트 $(date +'%Y-%m-%d')"
          git push || true
