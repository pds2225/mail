name: 수출지원 모니터링 자동 실행

on:
  schedule:
    # 매일 오전 8시 KST (= UTC 23시, 전날 기준)
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (Actions 탭에서 즉시 실행 가능)

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # seen_ids.json 커밋백(중복 재발송 방지 DB 저장)

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 커버리지 baseline(사이트별 평소 수집건수 이력)을 실행 간에 유지한다.
      # GitHub Actions 는 매번 새 환경이라 캐시로 넘겨주지 않으면 이력이 사라져
      # 이상탐지가 영원히 발동하지 못한다(restore-keys 로 가장 최근 것을 복원).
      - name: 커버리지 baseline 복원(전날까지 이력)
        uses: actions/cache/restore@v4
        with:
          path: coverage_baseline.json
          key: coverage-baseline-${{ github.run_id }}
          restore-keys: |
            coverage-baseline-

      - name: 공고 digest 자동발송 (+커버리지 이상탐지·크래시 알림)
        env:
          BIZINFO_API_KEY:    ${{ secrets.BIZINFO_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
        # 사용자 명시 승인(2026-07-14): 공고 digest 자동발송 재활성화. 그룹 수신자 전원
        #   (ekth3691 + dvd197001 + khban99)에게 매일 08:00 KST 실제 발송한다.
        # --persist-seen: 발송한 공고 id 를 seen_ids.json 에 기록(다음날 중복 재발송 방지).
        # --coverage-alert: 평소 N건 수집되던 사이트가 0건/급감/실패 시 PC 이메일 알림(누락 방지).
        run: python monitor.py --send --persist-seen --coverage-alert

      - name: 커버리지 baseline 저장(다음 실행 비교용)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: coverage_baseline.json
          key: coverage-baseline-${{ github.run_id }}

      - name: seen_ids.json·O/X 피드백 커밋 (중복 재발송 방지 + 골든 라벨 축적)
        if: always()
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 사용자가 digest 하단 '⭕ 맞아요/❌ 아니에요' 를 누르면 [MAIL-FB] 메일이 자기 함으로
          # 온다. 읽기전용 IMAP 으로 그 O/X 를 수집해 골든 라벨(data/golden/feedback_labels.jsonl,
          # tier C=사람확인)에 누적한다 → 정확도 하네스가 '사람 정답 vs 우리 판정'을 대조.
          # 수집 실패는 발송·중복방지와 무관하므로 경고만 내고 계속한다(발송은 이미 끝났다).
          python scripts/collect_feedback.py --days 60 || echo "::warning::O/X 피드백 수집 실패(무시) — 발송·중복방지엔 영향 없음"
          git add -f seen_ids.json data/golden/feedback_labels.jsonl || true
          if git diff --staged --quiet; then
            echo "seen_ids·피드백 라벨 변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "chore: seen_ids·O/X 피드백 업데이트 $(date +'%Y-%m-%d')"
          # 실행 중 원격 main 이 앞서가면(다른 실행/머지) push 가 거부된다. 기존 `git push || true`
          # 는 그 경우 오늘 발송 이력을 조용히 버려 다음날 '중복 재발송' 위험이 있었다.
          # → 거부되면 원격 트리에 하드 정렬(reset --hard)한 뒤 우리 두 파일만 재적용해 커밋한다.
          #   ★ reset --soft 를 쓰면 안 된다: 인덱스가 낡은 체크아웃 트리로 남아, 실행 중 원격에
          #     들어온 다른 커밋의 변경을 되돌려 버린다(발견된 버그). reset --hard 는 작업트리를
          #     원격과 동일하게 만들므로 다른 커밋은 그대로 보존되고, 우리는 seen_ids·피드백만 바꾼다.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "커밋백 push 성공 (시도 $i)"; exit 0
            fi
            echo "push 거부 — 원격 트리 기준으로 두 파일만 재적용 후 재시도 ($i)"
            git fetch origin main || true
            # 우리 seen_ids 를 하드리셋 전에 보존(리셋 후 원격본을 우리 것과 합집합).
            cp -f seen_ids.json /tmp/local_seen_ids.json 2>/dev/null || echo "[]" > /tmp/local_seen_ids.json
            git reset --hard origin/main
            python scripts/merge_seen_ids.py seen_ids.json /tmp/local_seen_ids.json || true   # 원격 ∪ 우리
            # 피드백 라벨: 하드리셋으로 파일이 원격본이 됨 → 오늘 O/X 를 멱등 재수집(원격 ∪ 오늘).
            python scripts/collect_feedback.py --days 60 || true
            git add -f seen_ids.json data/golden/feedback_labels.jsonl || true
            if git diff --staged --quiet; then
              echo "원격에 이미 반영됨 — 추가 커밋 불필요"; exit 0
            fi
            git commit -m "chore: seen_ids·O/X 피드백 업데이트(원격 병합) $(date +'%Y-%m-%d')"
            sleep 2
          done
          echo "::warning::커밋백 push 5회 실패 — 다음 실행에서 재수렴(발송 자체는 정상)"

      - name: 실패(크래시) 시 폰 알림
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: mail monitor CRASHED" \
              -H "Priority: urgent" \
              -H "Tags: rotating_light" \
              -d "공고 모니터링 실행이 크래시했습니다(메일 발송 안 됨). GitHub Actions 로그 확인 필요." \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi
