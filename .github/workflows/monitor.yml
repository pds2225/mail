name: 수출지원 모니터링 자동 실행

on:
  schedule:
    # 매일 오전 8시 KST (= UTC 23시, 전날 기준)
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (Actions 탭에서 즉시 실행 가능)

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # seen_ids.json 커밋백(중복 재발송 방지 DB 저장)

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 커버리지 baseline(사이트별 평소 수집건수 이력)을 실행 간에 유지한다.
      # GitHub Actions 는 매번 새 환경이라 캐시로 넘겨주지 않으면 이력이 사라져
      # 이상탐지가 영원히 발동하지 못한다(restore-keys 로 가장 최근 것을 복원).
      - name: 커버리지 baseline 복원(전날까지 이력)
        uses: actions/cache/restore@v4
        with:
          path: coverage_baseline.json
          key: coverage-baseline-${{ github.run_id }}
          restore-keys: |
            coverage-baseline-

      - name: 공고 digest 자동발송 (+커버리지 이상탐지·크래시 알림)
        env:
          BIZINFO_API_KEY:    ${{ secrets.BIZINFO_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
        # 사용자 명시 승인(2026-07-14): 공고 digest 자동발송 재활성화. 그룹 수신자 전원
        #   (ekth3691 + dvd197001 + khban99)에게 매일 08:00 KST 실제 발송한다.
        # --persist-seen: 발송한 공고 id 를 seen_ids.json 에 기록(다음날 중복 재발송 방지).
        # --coverage-alert: 평소 N건 수집되던 사이트가 0건/급감/실패 시 PC 이메일 알림(누락 방지).
        run: python monitor.py --send --persist-seen --coverage-alert

      - name: 커버리지 baseline 저장(다음 실행 비교용)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: coverage_baseline.json
          key: coverage-baseline-${{ github.run_id }}

      - name: seen_ids.json 커밋 (발송한 공고 기록 → 다음날 중복 재발송 방지)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen_ids.json || true
          if git diff --staged --quiet; then
            echo "seen_ids 변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "chore: seen_ids 업데이트 $(date +'%Y-%m-%d')"
          # 실행 중 원격 main 이 앞서가면(다른 실행/머지) push 가 거부된다. 기존 `git push || true`
          # 는 그 경우 오늘 발송 이력을 조용히 버려 다음날 '중복 재발송' 위험이 있었다.
          # → 원격과 seen_ids 를 합집합 병합(어느 이력도 안 잃음) 후 재커밋·재push 를 최대 5회 재시도.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "seen_ids push 성공 (시도 $i)"; exit 0
            fi
            echo "push 거부 — 원격과 seen_ids 합집합 병합 후 재시도 ($i)"
            git fetch origin main || true
            git show origin/main:seen_ids.json > /tmp/remote_seen_ids.json 2>/dev/null || echo "[]" > /tmp/remote_seen_ids.json
            python scripts/merge_seen_ids.py seen_ids.json /tmp/remote_seen_ids.json || true
            git reset --soft origin/main
            git add -f seen_ids.json
            git commit -m "chore: seen_ids 업데이트(원격 병합) $(date +'%Y-%m-%d')" || true
            sleep 2
          done
          echo "::warning::seen_ids push 5회 실패 — 다음 실행에서 재수렴(발송 자체는 정상)"

      - name: 실패(크래시) 시 폰 알림
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: mail monitor CRASHED" \
              -H "Priority: urgent" \
              -H "Tags: rotating_light" \
              -d "공고 모니터링 실행이 크래시했습니다(메일 발송 안 됨). GitHub Actions 로그 확인 필요." \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi
