name: 수출지원 모니터링 자동 실행

on:
  schedule:
    # 매일 오전 8시 KST (= UTC 23시, 전날 기준)
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (Actions 탭에서 즉시 실행 가능)

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 커버리지 baseline(사이트별 평소 수집건수 이력)을 실행 간에 유지한다.
      # GitHub Actions 는 매번 새 환경이라 캐시로 넘겨주지 않으면 이력이 사라져
      # 이상탐지가 영원히 발동하지 못한다(restore-keys 로 가장 최근 것을 복원).
      - name: 커버리지 baseline 복원(전날까지 이력)
        uses: actions/cache/restore@v4
        with:
          path: coverage_baseline.json
          key: coverage-baseline-${{ github.run_id }}
          restore-keys: |
            coverage-baseline-

      - name: 모니터링 실행 (+공고 digest 초안 생성·커버리지 이상탐지·폰 알림)
        env:
          BIZINFO_API_KEY:    ${{ secrets.BIZINFO_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NTFY_TOPIC:         ${{ secrets.NTFY_TOPIC }}
        # safe-by-default: 자동 스케줄은 실발송(SMTP) 없이 --draft 로 공고 digest 를
        #   Gmail '초안함(Drafts)'에만 만든다. 사람이 초안을 확인 후 직접 보낸다(자동 발송 아님).
        #   실제 메일 발송은 사람이 명시적으로(--send / API confirm_send="SEND") 할 때만.
        # --coverage-alert: 평소 N건 수집되던 사이트가 오늘 0건/급감/실패하면 폰(ntfy)
        #   알림 — 라이브 사이트가 조용히 바뀌어 공고를 놓치는 사고를 매일 감지(누락 방지).
        run: python monitor.py --draft --coverage-alert

      - name: 커버리지 baseline 저장(다음 실행 비교용)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: coverage_baseline.json
          key: coverage-baseline-${{ github.run_id }}

      - name: 실패(크래시) 시 폰 알림
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: mail monitor CRASHED" \
              -H "Priority: urgent" \
              -H "Tags: rotating_light" \
              -d "공고 모니터링 실행이 크래시했습니다(메일 발송 안 됨). GitHub Actions 로그 확인 필요." \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi
