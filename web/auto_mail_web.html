<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f8fafc; }
  .tab-btn { transition: all .15s; }
  .tab-btn.active { border-bottom: 3px solid #0284c7; color: #0284c7; font-weight:600; }
  .toggle { position:relative; display:inline-block; width:44px; height:24px; }
  .toggle input { opacity:0; width:0; height:0; }
  .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#cbd5e1; border-radius:24px; transition:.2s; }
  .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.2s; }
  input:checked + .slider { background:#0284c7; }
  input:checked + .slider:before { transform:translateX(20px); }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:9999px; font-size:12px; font-weight:500; }
  .badge-green { background:#dcfce7; color:#166534; }
  .badge-red { background:#fee2e2; color:#991b1b; }
  .badge-gray { background:#f1f5f9; color:#475569; }
  .card { background:white; border-radius:12px; border:1px solid #e2e8f0; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:none; transition:all .15s; }
  .btn-primary { background:#0284c7; color:white; }
  .btn-primary:hover { background:#0369a1; }
  .btn-secondary { background:#f1f5f9; color:#334155; border:1px solid #e2e8f0; }
  .btn-secondary:hover { background:#e2e8f0; }
  .btn-danger { background:#fee2e2; color:#991b1b; }
  .btn-danger:hover { background:#fecaca; }
  .input { width:100%; padding:8px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; outline:none; }
  .input:focus { border-color:#0284c7; box-shadow:0 0 0 3px #e0f2fe; }
  select.input { background:white; }
  .section-title { font-size:13px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
  .tag { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; background:#f0f9ff; border:1px solid #bae6fd; color:#0369a1; border-radius:6px; font-size:13px; }
  .tag button { background:none; border:none; cursor:pointer; color:#0369a1; font-size:15px; line-height:1; padding:0; }
  .copy-area { font-family:monospace; font-size:12px; background:#0f172a; color:#94a3b8; border-radius:8px; padding:16px; white-space:pre; overflow-x:auto; max-height:300px; overflow-y:auto; }
  .group-card { background:white; border-radius:12px; border:1px solid #e2e8f0; padding:20px; margin-bottom:16px; }
  .stat-box { text-align:center; }
  .search-box { position:relative; }
  .search-box input { padding-left:36px; }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#94a3b8; }
</style>

};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ── 헬퍼 ──────────────────────────────────────────────────────────
function showToast(msg, type="success") {
  state.toast = {msg, type};
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  showToast(filename + " 다운로드 완료");
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => showToast("클립보드에 복사됨"));
}

function getEnabledCount() { return state.sites.filter(s => s.enabled !== false).length; }
function getDisabledCount() { return state.sites.filter(s => s.enabled === false).length; }

function filteredSites() {
  return state.sites.filter(s => {
    const q = state.siteSearch.toLowerCase();
    const matchSearch = !q || s.name.toLowerCase().includes(q) || (s.note||"").toLowerCase().includes(q) || s.id.toLowerCase().includes(q);
    const matchFilter = state.siteFilter === "all" || 
      (state.siteFilter === "active" && s.enabled !== false) ||
      (state.siteFilter === "inactive" && s.enabled === false);
    return matchSearch && matchFilter;
  });
}

// ── 렌더 ──────────────────────────────────────────────────────────
function render() {
  document.getElementById("app").innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  return `
  <div class="min-h-screen">
    ${buildHeader()}
    ${buildTabs()}
    <div class="max-w-3xl mx-auto px-4 py-4">
      ${state.tab === "sites"   ? buildSitesTab()   : ""}
      ${state.tab === "groups"  ? buildGroupsTab()  : ""}
      ${state.tab === "settings"? buildSettingsTab(): ""}
    </div>
    ${buildToast()}
  </div>`;
}

function buildHeader() {
  return `
  <div style="background:white; border-bottom:1px solid #e2e8f0; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10;">
    <div>
      <div style="font-size:18px; font-weight:700; color:#0f172a;">⚙️ 모니터링 설정</div>
      <div style="font-size:12px; color:#64748b;">수집 사이트 · 키워드 · 알림 설정</div>
    </div>
    <button class="btn btn-primary" onclick="exportAll()">💾 전체 저장</button>
  </div>`;
}

function buildTabs() {
  const tabs = [
    { id:"sites",    label:`사이트 (${getEnabledCount()}/${state.sites.length})` },
    { id:"groups",   label:`그룹 (${state.groups.length})` },
    { id:"settings", label:"설정" },
  ];
  return `
  <div style="background:white; border-bottom:1px solid #e2e8f0; display:flex; padding:0 20px; overflow-x:auto;">
    ${tabs.map(t => `
      <button class="tab-btn ${state.tab===t.id?'active':''}"
        style="padding:12px 16px; border:none; background:none; font-size:14px; color:${state.tab===t.id?'#0284c7':'#64748b'}; white-space:nowrap; cursor:pointer;"
        onclick="setState({tab:'${t.id}'})">
        ${t.label}
      </button>
    `).join("")}
  </div>`;
}

function buildSitesTab() {
  const filtered = filteredSites();
  return `
  <div>
    <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center;">
      <div class="search-box" style="flex:1; min-width:180px;">
        <span class="search-icon">🔍</span>
        <input class="input" placeholder="사이트 검색..." value="${state.siteSearch}"
          oninput="setState({siteSearch:this.value})" style="padding-left:32px;">
      </div>
      <select class="input" style="width:auto; min-width:110px;" onchange="setState({siteFilter:this.value})">
        <option value="all" ${state.siteFilter==='all'?'selected':''}>전체</option>
        <option value="active" ${state.siteFilter==='active'?'selected':''}>활성만</option>
        <option value="inactive" ${state.siteFilter==='inactive'?'selected':''}>비활성만</option>
      </select>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:12px;">
      <div class="card" style="flex:1; padding:12px; text-align:center;">
        <div style="font-size:22px; font-weight:700; color:#0284c7;">${getEnabledCount()}</div>
        <div style="font-size:12px; color:#64748b;">활성</div>
      </div>
      <div class="card" style="flex:1; padding:12px; text-align:center;">
        <div style="font-size:22px; font-weight:700; color:#94a3b8;">${getDisabledCount()}</div>
        <div style="font-size:12px; color:#64748b;">비활성</div>
      </div>
      <div class="card" style="flex:1; padding:12px; text-align:center;">
        <div style="font-size:22px; font-weight:700; color:#334155;">${state.sites.length}</div>
        <div style="font-size:12px; color:#64748b;">전체</div>
      </div>
    </div>
    ${filtered.length === 0 ? '<div style="text-align:center; color:#94a3b8; padding:40px;">검색 결과 없음</div>' : ''}
    ${filtered.map((site, i) => buildSiteRow(site, i)).join("")}
    <div style="padding:12px; text-align:center;">
      <button class="btn btn-primary" onclick="downloadJSON('sites.json', state.sites)" style="width:100%;">
        ⬇️ sites.json 다운로드
      </button>
    </div>
  </div>`;
}

function buildSiteRow(site) {
  const enabled = site.enabled !== false;
  return `
  <div class="card" style="padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; opacity:${enabled?1:0.6};">
    <label class="toggle" style="flex-shrink:0;">
      <input type="checkbox" ${enabled?'checked':''} onchange="toggleSite('${site.id}')">
      <span class="slider"></span>
    </label>
    <div style="flex:1; min-width:0;">
      <div style="font-size:14px; font-weight:600; color:#1e293b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${site.name}</div>
      ${site.note ? `<div style="font-size:11px; color:#94a3b8; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${site.note}</div>` : ''}
    </div>
    <div style="flex-shrink:0;">
      ${enabled ? '<span class="badge badge-green">활성</span>' : '<span class="badge badge-gray">비활성</span>'}
    </div>
  </div>`;
}

function buildGroupsTab() {
  return `
  <div>
    ${state.groups.map((g, gi) => buildGroupCard(g, gi)).join("")}
    <button class="btn btn-secondary" onclick="addGroup()" style="width:100%; justify-content:center; margin-bottom:8px;">
      ＋ 그룹 추가
    </button>
    <div style="padding:12px; text-align:center;">
      <button class="btn btn-primary" onclick="downloadJSON('groups.json', state.groups)" style="width:100%;">
        ⬇️ groups.json 다운로드
      </button>
    </div>
  </div>`;
}

function buildGroupCard(g, gi) {
  const kwds = g.keywords?.keywords || [];
  const regions = g.regions || [];
  const recipients = g.recipients || [];
  const logic = g.keywords?.logic || "OR";

  return `
  <div class="group-card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <input class="input" style="font-size:16px; font-weight:700; border:none; padding:0; flex:1;"
        value="${escHtml(g.name)}" placeholder="그룹명"
        onchange="updateGroup(${gi}, 'name', this.value)">
      <div style="display:flex; gap:8px; align-items:center; flex-shrink:0; margin-left:8px;">
        <label class="toggle">
          <input type="checkbox" ${g.active!==false?'checked':''}
            onchange="updateGroup(${gi}, 'active', this.checked)">
          <span class="slider"></span>
        </label>
        ${state.groups.length > 1 ? `<button class="btn btn-danger" style="padding:4px 8px; font-size:12px;" onclick="removeGroup(${gi})">삭제</button>` : ''}
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div class="section-title">🌍 지역</div>
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;">
        ${regions.map((r,ri) => `
          <span class="tag">${r}
            <button onclick="removeRegion(${gi},${ri})">×</button>
          </span>`).join("")}
        ${regions.length === 0 ? '<span style="font-size:12px; color:#94a3b8;">전국 (지역 없음)</span>' : ''}
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        ${ALL_KNOWN_REGIONS.filter(r => !regions.includes(r)).slice(0,8).map(r => `
          <button class="btn btn-secondary" style="padding:4px 10px; font-size:12px;" onclick="addRegion(${gi},'${r}')">+${r}</button>
        `).join("")}
        <div style="display:flex; gap:4px; flex:1; min-width:100px;">
          <input class="input" style="font-size:13px;" placeholder="직접입력"
            id="region-input-${gi}" onkeydown="if(event.key==='Enter') addRegionCustom(${gi})">
          <button class="btn btn-secondary" style="flex-shrink:0; padding:6px 10px;" onclick="addRegionCustom(${gi})">+</button>
        </div>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
        <div class="section-title" style="margin:0;">🔑 키워드</div>
        <div style="display:flex; background:#f1f5f9; border-radius:6px; overflow:hidden;">
          <button style="padding:3px 10px; font-size:12px; border:none; cursor:pointer; font-weight:500;
            background:${logic==='OR'?'#0284c7':'#f1f5f9'}; color:${logic==='OR'?'white':'#475569'};"
            onclick="updateGroup(${gi}, 'logic', 'OR')">OR</button>
          <button style="padding:3px 10px; font-size:12px; border:none; cursor:pointer; font-weight:500;
            background:${logic==='AND'?'#0284c7':'#f1f5f9'}; color:${logic==='AND'?'white':'#475569'};"
            onclick="updateGroup(${gi}, 'logic', 'AND')">AND</button>
        </div>
        <span style="font-size:11px; color:#94a3b8;">${logic==='OR'?'하나라도 포함':'모두 포함'}</span>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;">
        ${kwds.map((k,ki) => `
          <span class="tag">${escHtml(k)}
            <button onclick="removeKeyword(${gi},${ki})">×</button>
          </span>`).join("")}
      </div>
      <div style="display:flex; gap:6px;">
        <input class="input" placeholder="키워드 입력 후 Enter"
          id="kw-input-${gi}" onkeydown="if(event.key==='Enter') addKeyword(${gi})">
        <button class="btn btn-secondary" style="flex-shrink:0;" onclick="addKeyword(${gi})">+</button>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div class="section-title">📂 지원유형</div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${SUPPORT_TYPES.map(t => `
          <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px;">
            <input type="checkbox" ${(g.support_types||[]).includes(t)?'checked':''}
              onchange="toggleSupportType(${gi},'${t}',this.checked)"
              style="width:15px; height:15px; accent-color:#0284c7;">
            ${t}
          </label>`).join("")}
      </div>
    </div>

    <div>
      <div class="section-title">📧 수신자</div>
      ${recipients.map((r,ri) => `
        <div style="display:flex; gap:6px; margin-bottom:6px; align-items:center;">
          <input class="input" style="font-size:13px;" value="${escHtml(r)}"
            onchange="updateRecipient(${gi},${ri},this.value)">
          <button class="btn btn-danger" style="flex-shrink:0; padding:6px 8px; font-size:12px;"
            onclick="removeRecipient(${gi},${ri})">×</button>
        </div>`).join("")}
      <div style="display:flex; gap:6px; margin-top:4px;">
        <input class="input" style="font-size:13px;" placeholder="이메일 추가"
          id="recip-input-${gi}" onkeydown="if(event.key==='Enter') addRecipient(${gi})">
        <button class="btn btn-secondary" style="flex-shrink:0;" onclick="addRecipient(${gi})">+</button>
      </div>
    </div>
  </div>`;
}

function buildSettingsTab() {
  const s = state.settings;
  return `
  <div>
    <div class="card" style="padding:20px; margin-bottom:12px;">
      <div style="font-size:15px; font-weight:700; color:#1e293b; margin-bottom:16px;">📅 수집 설정</div>

      <div style="margin-bottom:16px;">
        <div class="section-title">날짜 필터 (D-N)</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <label class="toggle">
            <input type="checkbox" ${s.date_filter_enabled?'checked':''}
              onchange="updateSetting('date_filter_enabled', this.checked)">
            <span class="slider"></span>
          </label>
          <span style="font-size:13px; color:#475569;">${s.date_filter_enabled ? '활성 (어제 공고만 수집)' : '비활성 (날짜 제한 없음)'}</span>
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <div class="section-title">기준일 (며칠 전)</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="number" class="input" min="1" max="30" style="width:80px;"
            value="${s.days_back}" onchange="updateSetting('days_back', parseInt(this.value))">
          <span style="font-size:13px; color:#64748b;">일 전 공고 수집</span>
        </div>
      </div>

      <div>
        <div class="section-title">병렬 수집 스레드</div>
        <div style="display:flex; align-items:center; gap:10px;">
          <input type="number" class="input" min="1" max="30" style="width:80px;"
            value="${s.fetch_max_workers}" onchange="updateSetting('fetch_max_workers', parseInt(this.value))">
          <span style="font-size:13px; color:#64748b;">동시 수집 수 (높을수록 빠름)</span>
        </div>
      </div>
    </div>

    <div class="card" style="padding:20px; margin-bottom:12px;">
      <div style="font-size:15px; font-weight:700; color:#1e293b; margin-bottom:16px;">📧 원본전체 메일</div>

      <div style="margin-bottom:12px;">
        <div style="display:flex; align-items:center; gap:10px;">
          <label class="toggle">
            <input type="checkbox" ${s.raw_all_enabled?'checked':''}
              onchange="updateSetting('raw_all_enabled', this.checked)">
            <span class="slider"></span>
          </label>
          <span style="font-size:13px; color:#475569;">원본 전체 공고 메일 발송</span>
        </div>
      </div>

      <div>
        <div class="section-title">수신자</div>
        ${(s.raw_all_recipients||[]).map((r,ri) => `
          <div style="display:flex; gap:6px; margin-bottom:6px;">
            <input class="input" style="font-size:13px;" value="${escHtml(r)}"
              onchange="updateRawRecipient(${ri}, this.value)">
            <button class="btn btn-danger" style="flex-shrink:0; padding:6px 8px; font-size:12px;"
              onclick="removeRawRecipient(${ri})">×</button>
          </div>`).join("")}
        <div style="display:flex; gap:6px; margin-top:4px;">
          <input class="input" style="font-size:13px;" placeholder="이메일 추가" id="raw-recip-input"
            onkeydown="if(event.key==='Enter') addRawRecipient()">
          <button class="btn btn-secondary" style="flex-shrink:0;" onclick="addRawRecipient()">+</button>
        </div>
      </div>
    </div>

    <div class="card" style="padding:20px; margin-bottom:12px;">
      <div style="font-size:15px; font-weight:700; color:#1e293b; margin-bottom:16px;">🤖 Claude 설정</div>

      <div style="margin-bottom:12px;">
        <div class="section-title">모델</div>
        <select class="input" onchange="updateSetting('claude_model', this.value)">
          ${['claude-sonnet-4-6','claude-sonnet-4-5','claude-haiku-4-5-20251001'].map(m =>
            `<option value="${m}" ${s.claude_model===m?'selected':''}>${m}</option>`).join("")}
        </select>
      </div>

      <div>
        <div class="section-title">최대 토큰</div>
        <input type="number" class="input" min="1000" max="8000" step="500"
          value="${s.claude_max_tokens}" onchange="updateSetting('claude_max_tokens', parseInt(this.value))">
      </div>
    </div>

    <button class="btn btn-primary" onclick="downloadJSON('settings.json', state.settings)" style="width:100%;">
      ⬇️ settings.json 다운로드
    </button>
  </div>`;
}

function buildToast() {
  if (!state.toast) return "";
  const colors = state.toast.type === "success" ? "background:#dcfce7; color:#166534; border:1px solid #86efac;" : "background:#fee2e2; color:#991b1b; border:1px solid #fca5a5;";
  return `
  <div style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%); ${colors} padding:10px 20px; border-radius:8px; font-size:14px; font-weight:500; box-shadow:0 4px 12px rgba(0,0,0,.1); z-index:100; white-space:nowrap;">
    ${state.toast.msg}
  </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 이벤트 핸들러 ────────────────────────────────────────────────
function attachEvents() {}  // onclick으로 처리

function toggleSite(id) {
  const site = state.sites.find(s => s.id === id);
  if (site) site.enabled = site.enabled === false ? true : false;
  render();
}

function updateGroup(gi, field, value) {
  if (field === "name") state.groups[gi].name = value;
  else if (field === "active") state.groups[gi].active = value;
  else if (field === "logic") state.groups[gi].keywords.logic = value;
  render();
}

function addKeyword(gi) {
  const input = document.getElementById(`kw-input-${gi}`);
  const kw = input?.value?.trim();
  if (!kw) return;
  if (!state.groups[gi].keywords) state.groups[gi].keywords = {logic:"OR",keywords:[]};
  if (!state.groups[gi].keywords.keywords.includes(kw)) {
    state.groups[gi].keywords.keywords.push(kw);
  }
  render();
}

function removeKeyword(gi, ki) {
  state.groups[gi].keywords.keywords.splice(ki, 1);
  render();
}

function addRegion(gi, region) {
  if (!state.groups[gi].regions) state.groups[gi].regions = [];
  if (!state.groups[gi].regions.includes(region)) state.groups[gi].regions.push(region);
  render();
}

function addRegionCustom(gi) {
  const input = document.getElementById(`region-input-${gi}`);
  const r = input?.value?.trim();
  if (!r) return;
  addRegion(gi, r);
}

function removeRegion(gi, ri) {
  state.groups[gi].regions.splice(ri, 1);
  render();
}

function addRecipient(gi) {
  const input = document.getElementById(`recip-input-${gi}`);
  const r = input?.value?.trim();
  if (!r) return;
  if (!state.groups[gi].recipients) state.groups[gi].recipients = [];
  state.groups[gi].recipients.push(r);
  render();
}

function updateRecipient(gi, ri, val) {
  state.groups[gi].recipients[ri] = val;
}

function removeRecipient(gi, ri) {
  state.groups[gi].recipients.splice(ri, 1);
  render();
}

function toggleSupportType(gi, type, checked) {
  const st = state.groups[gi].support_types || [];
  if (checked && !st.includes(type)) st.push(type);
  if (!checked) {
    const idx = st.indexOf(type);
    if (idx >= 0) st.splice(idx, 1);
  }
  state.groups[gi].support_types = st;
  render();
}

function addGroup() {
  state.groups.push({
    id: "grp_" + Date.now(),
    name: "새 그룹",
    active: true,
    regions: [],
    keywords: {logic:"OR", keywords:[]},
    support_types: [...SUPPORT_TYPES],
    recipients: [],
  });
  render();
}

function removeGroup(gi) {
  if (confirm("그룹을 삭제할까요?")) {
    state.groups.splice(gi, 1);
    render();
  }
}

function updateSetting(key, value) {
  state.settings[key] = value;
  render();
}

function addRawRecipient() {
  const input = document.getElementById("raw-recip-input");
  const r = input?.value?.trim();
  if (!r) return;
  if (!state.settings.raw_all_recipients) state.settings.raw_all_recipients = [];
  state.settings.raw_all_recipients.push(r);
  render();
}

function updateRawRecipient(ri, val) {
  state.settings.raw_all_recipients[ri] = val;
}

function removeRawRecipient(ri) {
  state.settings.raw_all_recipients.splice(ri, 1);
  render();
}

function exportAll() {
  downloadJSON('sites.json', state.sites);
  setTimeout(() => downloadJSON('groups.json', state.groups), 300);
  setTimeout(() => downloadJSON('settings.json', state.settings), 600);
  showToast("sites.json · groups.json · settings.json 저장 완료");
}

// 초기 렌더
render();
</script>
</body>
</html>
